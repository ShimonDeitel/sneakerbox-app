<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sneakerbox</title>
<style>
  body { margin:0; background:#08151A; color:#EAFBFA; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.4rem; margin-bottom:8px; color:#00C2A8; }
  p { font-size:1.1rem; color:#7FC9C0; line-height:1.5; }
  .badge { display:inline-block; margin-top:24px; padding:10px 20px; border:1px solid #00C2A8; border-radius:24px; color:#00C2A8; text-decoration:none; }
  footer { margin-top:48px; font-size:0.85rem; color:#7FC9C0; }
  a { color:#00C2A8; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #00C2A855 0%, #00C2A800 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Sneakerbox</h1>
    <p>Inventory your sneaker collection with size, condition, and box number.</p>
    <p>Log pairs with size and box number. Upgrade to Pro for wear-count tracking and resale price log.</p>
    <span class="badge">Available on the App Store</span>
    <footer>
      <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
      Contact: s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>
